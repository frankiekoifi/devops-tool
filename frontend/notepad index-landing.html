<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevOps Tool - FrankTechSpace</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          sans-serif;
        background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
        color: #fff;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
      }
      .container {

      }
      .logo {
        font-size: 48px;
        margin-bottom: 20px;
      }
      h1 {
        font-size: 32px;
        margin-bottom: 20px;
      }
      .btn {
        display: inline-block;
        padding: 12px 30px;
        margin: 10px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
        transition: all 0.3s;
      }
      .btn-primary {
        background: #00d4ff;

      }
      .btn-secondary {

      }

      }
      .info {

      <div>
